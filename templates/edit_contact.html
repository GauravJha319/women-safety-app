<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Contact</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
      }
      .page-wrap {
        display: flex;
        justify-content: center;
        padding: 20px;
      }
      .card {
        width: min(100%, 620px);
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        padding: 20px;
      }
      h2 {
        margin-top: 0;
        text-align: center;
      }
      form label {
        display: block;
        margin-top: 12px;
        font-weight: 600;
      }
      form input {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ced4da;
        border-radius: 5px;
      }
      form button {
        margin-top: 14px;
        width: 100%;
        background: #0b79d0;
        border: none;
        color: white;
        padding: 10px;
        border-radius: 6px;
        font-weight: 700;
        cursor: pointer;
      }
      .links {
        margin-top: 16px;
        display: flex;
        justify-content: space-between;
      }
      .links a button {
        border: none;
        background: #6c757d;
        color: #fff;
        padding: 8px 12px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <div class="card">
        <h2>Edit Emergency Contact</h2>
        <form method="POST" action="/edit_contact/{{ contact['id'] }}">
          <label for="name">Name</label>
          <input
            id="name"
            name="name"
            type="text"
            value="{{ contact['name'] }}"
            required
          />

          <label for="phone">Phone</label>
          <input
            id="phone"
            name="phone"
            type="text"
            value="{{ contact['phone'] }}"
            required
          />

          <label for="email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            value="{{ contact['email'] }}"
          />

          <button type="submit">Save Changes</button>
        </form>
        <div class="links">
          <a href="/contacts"
            ><button type="button">Back to Contacts</button></a
          >
          <a href="/dashboard"><button type="button">Dashboard</button></a>
        </div>
      </div>
    </div>
  </body>
</html>
