<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard | Women Safety App</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="dashboard">
      <h2>Welcome {{ name }}</h2>
      <p>She Sheild Dashboard</p>

      <a href="/history">
        <button style="margin-bottom: 15px">View My Alerts</button>
      </a>

      <a href="/contacts">
        <button style="margin-bottom: 15px">Emergency Contacts</button>
      </a>

      <button id="startTrackingBtn" style="margin-bottom: 15px">
        Start Live Tracking
      </button>
      <button id="stopTrackingBtn" style="margin-bottom: 15px; display: none">
        Stop Live Tracking
      </button>
      <button class="sos-btn">SOS</button>

      <div class="info-box">
        <p><strong>Current Location:</strong></p>
        <p id="location">Location will appear here</p>
      </div>

      <div id="statusBox" class="status-box" style="display: none">
        Emergency Alert Active
      </div>
      <div
        id="sendStatus"
        class="status-box"
        style="
          display: none;
          background: #e6ffec;
          color: #0d5f1b;
          border: 1px solid #a4dfad;
        "
      >
        SOS alert saved and emergency contacts notified.
      </div>

      <div class="info-box">
        <p><strong>Emergency Numbers</strong></p>
        <p>Police: 100</p>
        <p>Women Helpline: 181</p>
      </div>
      <a href="/logout">
        <button
          style="
            margin-top: 16px;
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
          "
        >
          Logout
        </button>
      </a>
    </div>
  </body>
  <script>
    const sosBtn = document.querySelector(".sos-btn");
    const locationText = document.getElementById("location");
    const statusBox = document.getElementById("statusBox");
    const sendStatus = document.getElementById("sendStatus");
    const dashboard = document.querySelector(".dashboard");
    const startTrackingBtn = document.getElementById("startTrackingBtn");
    const stopTrackingBtn = document.getElementById("stopTrackingBtn");
    let watchId = null;

    function updateLocationDisplay(lat, lon) {
      const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
      locationText.innerHTML = `📍 <strong>Live Tracking</strong><br>Latitude: ${lat.toFixed(6)}<br>Longitude: ${lon.toFixed(6)}<br><a href="${mapLink}" target="_blank">Open in Maps</a>`;
    }

    function sendLocationToBackend(lat, lon) {
      fetch("/update_location", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ latitude: lat, longitude: lon }),
      }).catch((err) => {
        console.error("Live tracking update failed", err);
      });
    }

    startTrackingBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        locationText.innerText =
          "Geolocation is not supported by this browser.";
        return;
      }

      if (watchId !== null) {
        return;
      }

      startTrackingBtn.style.display = "none";
      stopTrackingBtn.style.display = "inline-block";
      locationText.innerText = "Starting live tracking...";

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          updateLocationDisplay(lat, lon);
          sendLocationToBackend(lat, lon);
        },
        (error) => {
          locationText.innerText = `Unable to track location: ${error.message}`;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 5000,
          timeout: 10000,
        },
      );
    });

    stopTrackingBtn.addEventListener("click", () => {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      stopTrackingBtn.style.display = "none";
      startTrackingBtn.style.display = "inline-block";
      locationText.innerText = "Live tracking stopped.";
    });

    sosBtn.addEventListener("click", () => {
      if (navigator.geolocation) {
        dashboard.classList.add("alert-mode");
        statusBox.style.display = "block";
        locationText.innerText = "Fetching location...";

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;

            fetch("/save_sos", {
              method: "POST",
              headers: {
                "Content-Type": "application/x-www-form-urlencoded",
              },
              body: `latitude=${lat}&longitude=${lon}`,
            })
              .then((response) => response.text())
              .then((data) => {
                locationText.innerHTML = `\n                            🚨 <strong>SOS ACTIVATED</strong><br><br>\n                            📍 <a href="${mapLink}" target="_blank">Live Location</a><br><br>\n                            ✅ Alert Saved in Database\n                        `;
                sendStatus.style.display = "block";
                setTimeout(() => {
                  sendStatus.style.display = "none";
                }, 4500);
              });
          },
          () => {
            locationText.innerText = "Unable to fetch location.";
          },
        );
      }
    });
  </script>
</html>
